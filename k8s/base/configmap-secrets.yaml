# ──────────────────────────────────────────────────────────────────
# Namespace
# ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: loja-veloz
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted

---
# ──────────────────────────────────────────────────────────────────
# ConfigMap — variáveis não sensíveis
# ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: loja-veloz-config
  namespace: loja-veloz
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "pedidosdb"
  DB_USER: "postgres"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
  PEDIDOS_URL: "http://pedidos:8081"
  PAGAMENTOS_URL: "http://pagamentos:8082"
  ESTOQUE_URL: "http://estoque:8083"
  PAYMENT_GATEWAY_URL: "https://api.pagamentos.com"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"

---
# ──────────────────────────────────────────────────────────────────
# Secret — credenciais sensíveis (valores em base64)
# ATENÇÃO: Em produção, use um Secret Manager (AWS Secrets Manager,
# HashiCorp Vault ou External Secrets Operator)
# Os valores abaixo são apenas para referência de estrutura.
# Gere com: echo -n "sua-senha" | base64
# ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: loja-veloz-secrets
  namespace: loja-veloz
type: Opaque
data:
  db-password: cG9zdGdyZXM=        # "postgres" em base64 — TROQUE EM PROD
  payment-api-key: c2VjcmV0LWtleQ== # "secret-key" em base64 — TROQUE EM PROD
