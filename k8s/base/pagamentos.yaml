apiVersion: apps/v1
kind: Deployment
metadata:
  name: pagamentos
  namespace: loja-veloz
  labels:
    app: pagamentos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pagamentos
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pagamentos
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: pagamentos
          image: loja-veloz/pagamentos:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: loja-veloz-config
          env:
            - name: PAYMENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: loja-veloz-secrets
                  key: payment-api-key
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: pagamentos
  namespace: loja-veloz
spec:
  type: ClusterIP
  selector:
    app: pagamentos
  ports:
    - port: 8082
      targetPort: 8082
