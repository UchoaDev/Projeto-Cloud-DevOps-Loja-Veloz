global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: "pedidos"
    static_configs:
      - targets: ["pedidos:8081"]

  - job_name: "pagamentos"
    static_configs:
      - targets: ["pagamentos:8082"]

  - job_name: "estoque"
    static_configs:
      - targets: ["estoque:8083"]
